spring.data.mongodb.uri=${MONGODB_URI}

cookie.secure=true

jwt.secret=${JWT_SECRET}
jwt.expiry-ms=${JWT_EXPIRY_MS:86400000}

cors.allowed-origins=${ALLOWED_ORIGINS}
app.base-url=${APP_BASE_URL}

logging.level.com.substring.chat=INFO

spring.data.redis.url=${REDIS_URL:redis://localhost:6379}
app.presence.backend=${PRESENCE_BACKEND:redis}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

spring.servlet.multipart.max-file-size=51MB
spring.servlet.multipart.max-request-size=52MB

# ISO-8601 UTC timestamps
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

refresh.expiry-days=${REFRESH_EXPIRY_DAYS:30}
jwt.expiry-ms=${JWT_EXPIRY_MS:900000}

spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASS:}
spring.mail.from=${MAIL_FROM:noreply@baaat.app}

spring.data.mongodb.auto-index-creation=true
app.frontend-url=${FRONTEND_URL}
