spring.data.mongodb.uri=${MONGODB_URI}

jwt.secret=${JWT_SECRET}
jwt.expiry-ms=${JWT_EXPIRY_MS:86400000}

cors.allowed-origins=${ALLOWED_ORIGINS}
app.base-url=${APP_BASE_URL}

logging.level.com.substring.chat=INFO

spring.data.redis.url=${REDIS_URL:redis://localhost:6379}
app.presence.backend=${PRESENCE_BACKEND:redis}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

spring.servlet.multipart.max-file-size=51MB
spring.servlet.multipart.max-request-size=52MB

# ISO-8601 UTC timestamps
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
