spring.data.mongodb.uri=${MONGODB_URI}

cookie.secure=true

jwt.secret=${JWT_SECRET}
jwt.expiry-ms=${JWT_EXPIRY_MS:900000}
refresh.expiry-days=${REFRESH_EXPIRY_DAYS:30}

# These must be set on Render — empty-string fallbacks prevent cryptic Spring injection
# failures if an env var is accidentally omitted; the app will start but behave incorrectly
# until the correct value is provided.
cors.allowed-origins=${ALLOWED_ORIGINS:}
app.base-url=${APP_BASE_URL:}
app.frontend-url=${FRONTEND_URL:}

logging.level.com.substring.chat=INFO

spring.data.redis.url=${REDIS_URL:redis://localhost:6379}
app.presence.backend=${PRESENCE_BACKEND:redis}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

spring.servlet.multipart.max-file-size=51MB
spring.servlet.multipart.max-request-size=52MB

# ISO-8601 UTC timestamps
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# Brevo HTTP email API — works on Render free tier (HTTPS port 443, never blocked).
# No domain ownership required — just verify your sender Gmail address in the Brevo dashboard.
# Sign up at https://app.brevo.com (free, 300 emails/day, no credit card).
brevo.api-key=${BREVO_API_KEY:}
brevo.sender.email=${BREVO_SENDER_EMAIL:}
brevo.sender.name=${BREVO_SENDER_NAME:Baaat}

spring.data.mongodb.auto-index-creation=true

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
