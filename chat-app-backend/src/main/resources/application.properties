spring.application.name=chat-app-backend
spring.profiles.active=${APP_PROFILE:dev}
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/chatapp}
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT cookie settings
# cookie.secure must be true in production (HTTPS). Set via env var or application-prod.properties.
cookie.secure=${COOKIE_SECURE:false}
