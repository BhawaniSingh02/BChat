name: Build Desktop App

on:
  push:
    tags:
      - 'v*'          # triggers on v1.0.0, v1.0.1, etc.
  workflow_dispatch:  # allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: chat-app-desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: chat-app-desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false   # skip code signing
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:win

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            chat-app-desktop/dist/*.exe
            chat-app-desktop/dist/latest.yml
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (for manual runs)
        uses: actions/upload-artifact@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          name: Baaat-Windows
          path: |
            chat-app-desktop/dist/*.exe
          retention-days: 7
