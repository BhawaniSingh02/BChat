name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: Build & Test ──────────────────────────────────────────────────
  backend-test:
    name: Backend Tests (JUnit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('chat-app-backend/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Run backend tests
        working-directory: chat-app-backend
        run: ./gradlew test --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: chat-app-backend/build/reports/tests/

  # ── Frontend: Lint & Test ──────────────────────────────────────────────────
  frontend-test:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: chat-app-frontend/package-lock.json

      - name: Install dependencies
        working-directory: chat-app-frontend
        run: npm ci

      - name: Type check
        working-directory: chat-app-frontend
        run: npx tsc --noEmit

      - name: Run frontend tests
        working-directory: chat-app-frontend
        run: npx vitest run

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: chat-app-frontend/coverage/

  # ── Docker Build (on main push only) ──────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./chat-app-backend
          push: false
          tags: baaat-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./chat-app-frontend
          push: false
          tags: baaat-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_BASE_URL=http://localhost:8080/api/v1
            VITE_WS_URL=http://localhost:8080/ws
